<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia Sound-Color App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #noteDisplay {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.30/Tone.js"></script>
</head>
<body>
    <h1>Synesthesia Sound-Color Training</h1>
    <p>Press the button below to start analyzing your singing or music:</p>
    <button id="startButton">Start Microphone</button>
    <div id="noteDisplay">Note: </div>

    <script>
        document.getElementById('startButton').addEventListener('click', function() {
            // Create a new Tone.js UserMedia instance to access the microphone
            const mic = new Tone.UserMedia().toDestination();

            // Open the microphone
            mic.open().then(() => {
                // Create a new Tone.js PitchShift instance to analyze the pitch
                const pitchShift = new Tone.PitchShift().toDestination();
                mic.connect(pitchShift);

                // Create an animation loop to continuously analyze the pitch
                Tone.Transport.scheduleRepeat(time => {
                    const frequency = pitchShift.frequency.value;
                    const note = Tone.Frequency(frequency).toNote();
                    const color = mapNoteToColor(note);
                    updateUI(note, color);
                }, '16n');

                // Start the Tone.js Transport
                Tone.Transport.start();
            }).catch(error => {
                console.error('Error accessing microphone:', error);
            });
        });

        function mapNoteToColor(note) {
            // Map the note to a corresponding color (e.g., C to red, D to orange, etc.)
            // You can customize this mapping based on your preferences
            const colors = {
                'C': 'red',
                'D': 'orange',
                'E': 'yellow',
                'F': 'green',
                'G': 'blue',
                'A': 'purple',
                'B': 'pink'
            };
            return colors[note[0]]; // Use the first character of the note name (e.g., 'C' in 'C4')
        }

        function updateUI(note, color) {
            document.body.style.backgroundColor = color;
            document.getElementById('noteDisplay').innerText = 'Note: ' + note;
        }
    </script>
</body>
</html>
