<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia Color-Sound App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #noteDisplay {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.30/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/urtzurd/html-piano/pitchy.min.js"></script>
</head>
<body>
    <h1>Synesthesia Color-Sound Training</h1>
    <p>Press the button below to start analyzing your singing or music:</p>
    <button id="startButton">Start Microphone</button>
    <div id="noteDisplay">Note: </div>

    <script>
        document.getElementById('startButton').addEventListener('click', function() {
            const mic = new Tone.UserMedia().toDestination();
            mic.open().then(() => {
                const analyser = new Tone.Analyser('waveform', 1024);
                mic.connect(analyser);

                function analyze() {
                    requestAnimationFrame(analyze);
                    const waveform = analyser.getValue();
                    const frequency = detectPitch(waveform);
                    const note = Tone.Frequency(frequency).toNote();
                    const color = mapNoteToColor(note);
                    updateUI(note, color);
                }

                analyze();
            }).catch(error => {
                console.error('Error accessing microphone:', error);
            });
        });

        function detectPitch(waveform) {
            const sampleRate = Tone.context.sampleRate;
            const pitch = Pitchy.detect(waveform, sampleRate);
            return pitch.freq;
        }

        function mapNoteToColor(note) {
            const colors = {
                'C': 'red',
                'D': 'orange',
                'E': 'yellow',
                'F': 'green',
                'G': 'blue',
                'A': 'purple',
                'B': 'pink'
            };
            return colors[note[0]];
        }

        function updateUI(note, color) {
            document.body.style.backgroundColor = color;
            document.getElementById('noteDisplay').innerText = 'Note: ' + note;
        }
    </script>
</body>
</html>
